<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis 1 | M Rafly Saputra</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="container">
      <div class="logo">
          
      </div>
      <div class="title">
        <h1>Selamat Datang</h1>
        <p>Silahkan masukkan data untuk masuk</p>
      </div>
      <form action="#" class="form-group">
        <section class="form-input">
          <label for="email">Email</label>
          <input type="text" name="email" placeholder="Masukkan email" class="input" />
        </section>
        <section class="form-input">
          <label for="nama">Nama</label>
          <input type="text" name="nama" placeholder="Masukkan nama" class="input" />
        </section>
        <section class="form-input">
          <label for="password">Password</label>
          <input type="password" name="password" placeholder="Masukkan password" class="input" />
        </section>
        <section class="form-ingat">
          <div class="ingat-saya">
            <input type="checkbox">
            ingat saya
          </div>
          <a href="#">Lupa password?</a>
        </section>
        <button type="submit" class="btn-submit">Masuk</button>
      </form>
    </div>
  </body>
</html>
